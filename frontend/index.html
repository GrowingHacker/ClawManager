<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>ClawManager</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <script src="/src/scripts/vue.global.js"></script>
  <script src="/src/scripts/i18n.js"></script>
  <link rel="stylesheet" href="/src/css/app.css" />
</head>
<body>
<div id="app" v-cloak>
  <div class="app-layout">
    <!-- 侧边栏 -->
    <div class="sidebar" ref="sidebarRef">
      <div class="brand">
        <div class="brand-icon">
          <span class="brand-icon-inner">🦞</span>
        </div>
        <div class="brand-text">
          <span class="brand-name">ClawManager</span>
          <span class="brand-version">SYSTEM v26.3.31</span>
        </div>
      </div>
      <div class="blob" ref="blobRef"></div>

      <div class="nav-section">
        <div class="nav-section-label">{{ t('nav.core') }}</div>

        <div class="nav-item" :class="{active: page===0, disabled: !canAccessCorePages}" @click="goPage(0)">
          <span class="nav-icon">⚡</span>
          <span class="nav-label">{{ t('nav.openclaw') }}</span>
          <span v-if="!canAccessCorePages" class="lock-icon" :title="t('msg.wsl_lock')">🔒</span>
        </div>

        <div class="nav-item" :class="{active: page===1, disabled: !canAccessCorePages}" @click="goPage(1)">
          <span class="nav-icon">🖥️</span>
          <span class="nav-label">{{ t('nav.dashboard') }}</span>
          <span v-if="!canAccessCorePages" class="lock-icon" :title="t('msg.wsl_lock')">🔒</span>
        </div>

        <div class="nav-item" :class="{active: page===3, disabled: !canAccessCorePages}" @click="goPage(3)">
          <span class="nav-icon">🤖</span>
          <span class="nav-label">{{ t('nav.model') }}</span>
          <span v-if="!canAccessCorePages" class="lock-icon" :title="t('msg.wsl_lock')">🔒</span>
        </div>

        <div class="nav-item" :class="{active: page===4, disabled: !canAccessCorePages}" @click="goPage(4)">
          <span class="nav-icon">🔌</span>
          <span class="nav-label">{{ t('nav.plugin') }}</span>
          <span v-if="!canAccessCorePages" class="lock-icon" :title="t('msg.wsl_lock')">🔒</span>
        </div>
      </div>

      <div class="nav-bottom">
        <div class="nav-item" :class="{active: page===2}" @click="goPage(2)">
          <span class="nav-icon">⚙️</span>
          <span class="nav-label">{{ t('nav.settings') }}</span>
        </div>
        <div class="sidebar-status-line">
          <div class="sidebar-status-dot"></div>
          <span>SYSTEM ONLINE</span>
        </div>
      </div>
    </div>

    <!-- 主体内容 -->
    <div class="main-content">
      <template v-if="ready">
        <div class="page" :class="{active: page===0, exit: exitPage===0}"><page-0 /></div>
        <div class="page" :class="{active: page===1, exit: exitPage===1}"><page-1 /></div>
        <div class="page" :class="{active: page===2, exit: exitPage===2}"><page-2 /></div>
        <div class="page" :class="{active: page===3, exit: exitPage===3}"><page-3 /></div>
        <div class="page" :class="{active: page===4, exit: exitPage===4}"><page-4 /></div>
      </template>
      <div v-else class="loading-state">
        <div class="spinner"></div>
        <p>{{ t('app.loading') }}</p>
      </div>
    </div>
  </div>
  
  <div class="toast-stack">
    <div v-for="t in toasts" :key="t.id" class="toast" :class="t.type">
      <span class="toast-icon" v-if="t.type === 'success'">✅</span>
      <span class="toast-icon" v-else-if="t.type === 'error'">❌</span>
      <span class="toast-icon" v-else-if="t.type === 'warning'">⚠️</span>
      <span class="toast-icon" v-else>ℹ️</span>
      <div class="toast-text">{{ t.text }}</div>
    </div>
  </div>
</div>

<script>
async function loadPage(path) {
  const html = await (await fetch(path)).text()
  const scriptMatch = html.match(/<script page-setup>([\s\S]*?)<\/script>/)
  let pageSetup = () => ({})
  if (scriptMatch) {
    pageSetup = new Function(scriptMatch[1] + '\nreturn pageSetup')()
  }
  const template = html.replace(/<script page-setup>[\s\S]*?<\/script>/, '').trim()
  return { template, pageSetup }
}

async function initApp() {
  const { createApp, ref, reactive, computed, nextTick, provide, inject, onMounted } = Vue

  // 尽早开始探测，与下方 fetch 页面并行；不得在 mount 前 await，否则 [v-cloak] 会一直隐藏整页导致黑屏。
  const initialStatePromise = (async () => {
    try {
      if (window.go && window.go.main && window.go.main.App) {
        return { ok: true, state: await window.go.main.App.GetInitialState() }
      }
      return { ok: false, state: null }
    } catch (e) {
      console.error(e)
      return { ok: false, error: e }
    }
  })()

  const pages = await Promise.all([
    loadPage('/pages/OpenClawManager.html'),
    loadPage('/pages/DashboardManager.html'),
    loadPage('/pages/Settings.html'),
    loadPage('/pages/ModelsManager.html'),
    loadPage('/pages/PluginsManager.html'),
  ])

  const app = createApp({
    setup() {
      const ready      = ref(false)
      const page       = ref(0)
      const exitPage   = ref(-1)
      const sidebarRef = ref(null)
      const blobRef    = ref(null)
      const toasts     = ref([])
      const currentLang = ref(localStorage.getItem('lang') || 'zh-CN')

      function t(key) {
        return window.i18nMessages[currentLang.value]?.[key] || key
      }

      const sysState = reactive({
        wsl: { installed: false, distroInstalled: false, running: false, version: '', error: '' },
        openclaw: { installed: false, version: '', gatewayRunning: false, error: '' }
      })
      const canAccessCorePages = computed(() => ready.value && sysState.wsl.running)

      function moveBlob() {
        nextTick(() => {
          const sidebar = sidebarRef.value, blob = blobRef.value
          if (!sidebar || !blob) return
          
          // 跳过品牌头部元素（子元素索引为 0）
          const items = Array.from(sidebar.querySelectorAll('.nav-item'))
          
          let activeIndex = page.value
          if (activeIndex === 2) { // 设置页面固定在底部
            activeIndex = 4 
          } else if (activeIndex === 3) {
            activeIndex = 2
          } else if (activeIndex === 4) {
            activeIndex = 3
          }

          const active = items[activeIndex]
          if (!active) return
          const sr = sidebar.getBoundingClientRect()
          const er = active.getBoundingClientRect()
          blob.style.top = (er.top - sr.top) + 'px'
        })
      }

      function goPage(idx) {
        // 设置页面始终可访问
        if (idx === 2) {
          // 允许访问设置页面
        }
        // 其他页面只需要 WSL 运行
        else {
          if (!ready.value) {
            toast(t('app.checking'), 'warning')
            return
          }
          // 检查 WSL 是否运行
          if (!sysState.wsl.running) {
            toast(t('app.wsl_not_started'), 'warning')
            return
          }
        }
        
        if (idx === page.value) return
        exitPage.value = page.value
        setTimeout(() => { exitPage.value = -1 }, 300)
        setTimeout(() => { page.value = idx; moveBlob() }, 50)
      }

      function toast(text, type = 'info') {
        const id = Date.now() + Math.random()
        // 去掉 ANSI 码并截取长度
        const cleanText = text.toString()
          .replace(/\x1b\[[0-9;]*[a-zA-Z]/g, '')
          .substring(0, 300)

        toasts.value.push({ id, text: cleanText, type })
        setTimeout(() => toasts.value = toasts.value.filter(x => x.id !== id), 3200)
      }

      let dashboardRefreshFn = null
      let dashboardStartFn = null
      let dashboardWslStoppedFn = null
      function registerDashboardRefresh(fn) {
        dashboardRefreshFn = fn
      }
      function registerDashboardStart(fn) {
        dashboardStartFn = fn
      }
      function registerDashboardWslStopped(fn) {
        dashboardWslStoppedFn = fn
      }
      function triggerDashboardRefresh() {
        if (dashboardRefreshFn) dashboardRefreshFn()
      }
      function triggerDashboardStart() {
        if (dashboardStartFn) dashboardStartFn()
      }
      function triggerDashboardWslStopped() {
        if (dashboardWslStoppedFn) dashboardWslStoppedFn()
      }
      function triggerOpenClawWslStopped() {
        sysState.openclaw.gatewayRunning = false
        sysState.openclaw.error = ''
      }
      function triggerWslStarted() {
        sysState.wsl.running = true
      }
      function triggerWslStopped() {
        sysState.wsl.running = false
      }

      function resolveInitialPage() {
        page.value = (!sysState.wsl.running || !sysState.openclaw.installed) ? 2 : 0
      }

      async function recoverBootStateIfWslWasMisdetected() {
        if (!window.go || !window.go.main || !window.go.main.App) return
        if (!sysState.wsl.installed || !sysState.wsl.distroInstalled || sysState.wsl.running) return

        for (let attempt = 0; attempt < 4; attempt++) {
          await new Promise(resolve => setTimeout(resolve, 800))

          try {
            const running = await window.go.main.App.CheckWSLRunning()
            if (!running) continue

            sysState.wsl.running = true

            const state = await window.go.main.App.GetInitialState()
            if (state && state.wsl) {
              sysState.wsl = {
                ...state.wsl,
                running: state.wslRunning
              }
            }
            if (state && state.openclaw) {
              sysState.openclaw = state.openclaw
            }
            return
          } catch (e) {
            console.error(e)
          }
        }
      }

      const bootTimeoutMs = 25000

      onMounted(async () => {
        let boot = { ok: false, state: null }
        try {
          boot = await Promise.race([
            initialStatePromise,
            new Promise((resolve) =>
              setTimeout(
                () => resolve({ ok: false, state: null, timedOut: true }),
                bootTimeoutMs,
              ),
            ),
          ])
        } catch (e) {
          console.error(e)
          boot = { ok: false, state: null, error: e }
        }
        if (boot && boot.timedOut) {
          toast(t('app.timeout'), 'warning')
        }
        if (boot && boot.ok && boot.state) {
          sysState.wsl = {
            ...boot.state.wsl,
            running: boot.state.wslRunning
          }
          sysState.openclaw = boot.state.openclaw
          await recoverBootStateIfWslWasMisdetected()
          resolveInitialPage()
        }
        if (boot && boot.ok === false && boot.error) {
          toast(t('app.conn_error'), 'error')
        }
        ready.value = true
        nextTick(() => moveBlob())
      })

      // 监听窗口大小变化以修复悬浮块位置
      window.addEventListener('resize', () => moveBlob())

      const deps = { toast, nextTick, sysState, registerDashboardRefresh, registerDashboardStart, registerDashboardWslStopped, triggerDashboardRefresh, triggerDashboardStart, triggerDashboardWslStopped, triggerOpenClawWslStopped, triggerWslStarted, triggerWslStopped, currentLang, t }
      const ctx = {
        sysState, goPage, currentLang, t,
        ...pages[0].pageSetup(deps),
        ...pages[1].pageSetup(deps),
        ...pages[2].pageSetup(deps),
        ...pages[3].pageSetup(deps),
        ...pages[4].pageSetup(deps),
      }

      provide('ctx', ctx)

      return { ready, page, exitPage, sidebarRef, blobRef, toasts, sysState, canAccessCorePages, goPage, currentLang, t }
    }
  })

  pages.forEach((p, i) => {
    app.component(`page-${i}`, {
      template: p.template,
      setup() { return inject('ctx') }
    })
  })

  app.mount('#app')
}

// 等待 wails 前端绑定加载完毕
window.onload = initApp;
</script>
</body>
</html>
